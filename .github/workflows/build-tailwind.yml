name: Build Tailwind CSS

on:
  push:
    paths:
      - "*.html"
      - "tailwind-input.css"
      - ".github/workflows/build-tailwind.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Tailwind CLI
        run: npm install tailwindcss @tailwindcss/cli --no-save

      - name: Build static Tailwind CSS
        run: npx @tailwindcss/cli -i ./tailwind-input.css -o ./tailwind-static.css --minify

      - name: Commit built CSS
        run: |
          if git diff --quiet -- tailwind-static.css; then
            echo "No CSS changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tailwind-static.css
            git commit -m "Build tailwind-static.css"
            git push
          fi
